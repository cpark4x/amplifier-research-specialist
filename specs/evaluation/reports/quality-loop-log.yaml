candidates: "see diagnosis output for full list"
chosen_because: "** Citation quality is the single largest structural gap across all valid topics — averaging −3.75 points vs best competitor, appearing in 100% of topics (4/4), and accounting for 68% of the total aggregate deficit. Three separate evaluators independently confirmed this is the #1 priority fix, and two stated it would also improve source quality and factual depth as secondary effects. The root cause is precisely locatable: the writer's Stage 4 instruction tells it to use opaque S-code labels (`S1 (3–6 word label)`) instead of URLs, making the final document unverifiable. Competitors all provide per-claim inline hyperlinks — a practice the pipeline's upstream research stage already supports (it collects URLs) but the writer stage discards."
target: "** agents/writer.md"
edit_plan: "** Replace the opaque S-code blockquote attribution format in Stage 4 (lines 235–243) with inline citation instructions that embed source URLs directly in the prose. Specifically: (1) After each factual claim or claim cluster, the writer must insert an inline parenthetical citation with the source URL from the upstream research, e.g., `([Source Name](URL))` — not just `S1 (label)`. (2) Add a "Sources" appendix section requirement at document end (before the provenance footer) that lists every cited source with S-number, label, URL, and tier in a table. (3) Preserve S-code numbering internally for traceability to the writer-formatter, but require the prose body to be self-contained with clickable URLs so the final document is independently verifiable without needing the CITATIONS structural block."
