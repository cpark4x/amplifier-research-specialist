edit_plan: "Add a coverage breadth gate after the deep-research phase. The researcher must (1) generate a topic-dimension inventory listing all distinct facets the question could cover, (2) self-audit which dimensions have findings and which are uncovered, (3) launch targeted gap-filling search rounds for uncovered dimensions, and (4) scale the expected dimension count to question type (survey/comparison: 8-12 dimensions, technical: 5-8, strategy: 6-10). This prevents the researcher from anchoring on an initial source cluster and missing 3-5 topic dimensions that competitors consistently find."
