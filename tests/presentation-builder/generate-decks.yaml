# =============================================================================
# Presentation Builder Test Harness — Deck Generation
# =============================================================================
#
# Generates a single presentation deck from a test scenario file by delegating
# to the presentation-builder specialist. Run once per scenario.
#
# Requirements:
#   - specialists bundle (provides specialists/presentation-builder agent)
#
# Usage (single scenario):
#   amplifier tool invoke recipes operation=execute \
#     recipe_path=tests/presentation-builder/generate-decks.yaml \
#     context='{"scenario_path": "tests/presentation-builder/scenarios/01-qbr-status-update.md"}'
#
# Usage (all 6 scenarios):
#   for f in tests/presentation-builder/scenarios/*.md; do
#     amplifier tool invoke recipes operation=execute \
#       recipe_path=tests/presentation-builder/generate-decks.yaml \
#       context="{\"scenario_path\": \"$f\"}"
#   done
#
# Context variables:
#   - scenario_path (required): Path to a scenario .md file
#   - output_dir (optional): Directory for generated decks
#                             (default: tests/presentation-builder/outputs)
#
# Typical runtime: 3-8 minutes per scenario
#
# =============================================================================
# CHANGELOG
# =============================================================================
#
# v2.0.0 (2026-03-19):
#   - Redesign: model owns full HTML output, no post-processor
#     * Step 2: Removed "no <script> tag" instruction — model owns navigation JS
#     * Step 3: Replaced HTML extraction regex + post-processor with trivial trim
#     * Removed fix-navigation.py dependency entirely
#
# v1.0.0 (2025-07-24):
#   - Initial recipe: single-scenario deck generation pipeline
#     * Step 1: Read scenario file (bash, with validation)
#     * Step 2: Delegate to presentation-builder specialist
#     * Step 3: Save generated deck to output directory
#
# =============================================================================

name: "generate-deck"
description: "Generate a presentation deck from a test scenario using the presentation-builder specialist"
version: "1.0.0"
tags: ["presentation-builder", "testing", "evaluation-harness"]

context:
  scenario_path: ""                                   # Required: path to scenario .md file
  output_dir: "tests/presentation-builder/outputs"    # Output directory for generated decks

steps:
  # ── Step 1: Read and validate the scenario file ────────────────────────────
  - id: "read-scenario"
    type: "bash"
    command: |
      set -euo pipefail
      if [ ! -f "{{scenario_path}}" ]; then
        echo "ERROR: Scenario file not found: {{scenario_path}}" >&2
        exit 1
      fi
      cat "{{scenario_path}}"
    output: "scenario_content"
    timeout: 30

  # ── Step 2: Generate presentation via the presentation-builder specialist ──
  #
  # The specialist receives the full scenario file content including both the
  # Parameters section (audience, tone, theme, etc.) and the Source Material
  # section. It is instructed to extract and follow all parameters.
  #
  # No model override — uses the specialist's default model configuration.
  - id: "generate-presentation"
    agent: "specialists:presentation-builder"
    prompt: |
      Generate a presentation from the following test scenario.

      The scenario file below contains:
      - A **Parameters** section listing audience, audience_type, purpose, tone,
        output_format, theme, presentation_mode, include_speaker_notes,
        include_appendix, and other configuration.
      - A **Source Material** section containing the structured input to build from.

      Instructions:
      1. Extract and follow ALL parameters exactly as specified.
      2. Build the complete presentation from the Source Material section.
      3. Do NOT fabricate any claims, statistics, or data points not present
         in the source material.
      4. Do NOT write to files — return the full content as your response.
         Return ONLY raw HTML. The first character of your response MUST be
         `<` (e.g., `<!DOCTYPE html>`) and the last MUST be `>` (e.g.,
         `</html>`). No prose, no explanation, no markdown fences, no
         "Here is the presentation" preamble. Raw HTML only.

      === SCENARIO FILE ===
      {{scenario_content}}
      === END SCENARIO FILE ===
    output: "deck_output"
    timeout: 1800

  # —— Step 3: Save the generated deck to the output directory ————————————————
  - id: "save-output"
    type: "bash"
    command: |
      set -euo pipefail
      mkdir -p "{{output_dir}}"

      # Derive output filename from scenario path
      scenario_basename=$(basename "{{scenario_path}}" .md)
      output_path="{{output_dir}}/${scenario_basename}-output.html"

      # Write raw agent output to temp file
      raw_path="${output_path}.raw"
      cat > "${raw_path}" <<'_CANVAS_DECK_EOF_7f3a9c'
      {{deck_output}}
      _CANVAS_DECK_EOF_7f3a9c

      # Trivial trim: strip any prose before the first < and after the last >.
      # The model should return clean HTML, but occasionally wraps output in
      # markdown fences or a prose preamble. This is string trimming, not HTML
      # surgery — no regex parsing, no structural assumptions.
      python3 -c "
      import re, sys
      with open('${raw_path}', 'r') as f:
          content = f.read()

      start = content.find('<')
      end = content.rfind('>') + 1
      if start < 0 or end <= start:
          print('ERROR: No HTML tags found in agent output', file=sys.stderr)
          sys.exit(1)

      html = content[start:end]

      # --- Sanity gate: catch broken output before wasting eval time ---
      errors = []
      if len(html) < 5000:
          errors.append(f'HTML too small ({len(html)} bytes, min 5000)')
      if '</html>' not in html.lower():
          errors.append('Missing </html> — output likely truncated')
      if '<script' not in html.lower():
          errors.append('No <script> tag — model failed to produce navigation JS')
      if not re.search(r'\bslide\b(?!-)', html):
          errors.append('No slide elements found (expected class matching \\\bslide\\\b)')
      if errors:
          print('SANITY CHECK FAILED:', file=sys.stderr)
          for e in errors:
              print(f'  - {e}', file=sys.stderr)
          sys.exit(1)

      with open('${output_path}', 'w') as f:
          f.write(html)
      print(f'Saved {len(html)} bytes of HTML')
      print(f'Sanity check: </html> present, <script> present, slide elements found')
      "

      # Clean up raw file
      rm -f "${raw_path}"

      # Verify write succeeded
      if [ -s "${output_path}" ]; then
        byte_count=$(wc -c < "${output_path}")
        echo "Saved: ${output_path} (${byte_count} bytes)"
      else
        echo "ERROR: Write failed or produced empty output" >&2
        exit 1
      fi
    output: "save_result"
    timeout: 30
