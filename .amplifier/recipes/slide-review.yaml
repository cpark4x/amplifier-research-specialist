name: slide-visual-review
version: "1.0.0"
description: Visual critique of all 9 deck slides

steps:
  - id: visual_review
    agent: vision
    prompt: |
      You have 9 presentation slide screenshots to review. They are saved as PNG files at:
        /tmp/deck-review-v5-final/slide-1.png  through  /tmp/deck-review-v5-final/slide-9.png

      The deck is titled "The Seventh Layer — Cognitive Routing in Agent Pipelines". Dark near-black background (#07070f), purple accent (#A78BFA), danger red (#FF453A), success green (#30D158).

      Read each PNG file and visually analyze it. For EACH slide (1–9), give exactly 4 items — be specific and brief:

      1. Dominant element — what the eye hits first. Name the exact element and why it dominates (size / color / weight / isolation).
      2. Key point lands before body text? — yes / no
      3. Density — one word only: clean / medium / dense
      4. Problems — one sentence on any hierarchy or readability issue. "None" if clean.

      Slide titles for context:
        1 — Cold Open
        2 — The Contract
        3 — The Instinct
        4 — The Format Spec Gets Buried
        5 — The Wrong Cognitive Mode
        6 — The Reframe
        7 — The Fix
        8 — Validation
        9 — The Principle

      Format output as a numbered list 1–9, each with the 4 labeled items.
