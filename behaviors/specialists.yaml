bundle:
  name: specialists-behavior
  version: 1.0.0
  description: Adds researcher and writer specialists with web and rendering capabilities

tools:
  - module: tool-web
    source: git+https://github.com/microsoft/amplifier-module-tool-web@main
  - module: tool-canvas-renderer
    source: ./modules/tool-canvas-renderer
  - module: tool-skills
    config:
      skills:
        - "git+https://github.com/cpark4x/amplifier-doc-driven-dev@main#subdirectory=skills"

agents:
  include:
    - specialists:specialists/researcher
    - specialists:specialists/writer
    - specialists:specialists/competitive-analysis
    - specialists:specialists/data-analyzer
    - specialists:specialists/researcher-formatter

context:
  include:
    - specialists:context/specialists-instructions.md
