bundle:
  name: specialists-behavior
  version: 1.0.0
  description: Adds researcher and writer specialists with web and rendering capabilities

tools:
  - module: tool-web
    source: git+https://github.com/microsoft/amplifier-module-tool-web@main
  - module: tool-canvas-renderer
    source: ../modules/tool-canvas-renderer
  - module: tool-skills
    config:
      skills:
        - "@doc-driven-dev:skills"

agents:
  include:
    - specialists:researcher
    - specialists:writer
    - specialists:competitive-analysis
    - specialists:data-analyzer
    - specialists:data-analyzer-formatter
    - specialists:researcher-formatter
    - specialists:storyteller
    - specialists:story-formatter
    - specialists:writer-formatter
    - specialists:prioritizer
    - specialists:prioritizer-formatter
    - specialists:planner

# hooks:
#   - module: hook-specialist-narration
#     source: ../modules/hook-specialist-narration
#   Deferred 2026-03-06: prompt-level narration sufficient at >90% reliability.
#   Module stub retained on disk for future use. Re-enable if code-level narration needed.

spawn:
  exclude_tools: [write_file, edit_file, apply_patch]

