#
# v1.8.1 (2026-03-11):
#   - FIX: Hardened both bash strip steps against edge cases
#     * strip-parsed-prefix: Added fallback — if no "RESEARCH OUTPUT" line found,
#       passes through entire input instead of producing empty output. Prevents
#       catastrophic data loss when formatter output format varies.
#     * strip-formatter-notes: Replaced keyword-matching with generic pattern
#       `^**...:**$` that catches ALL formatter artifact headers — any bold line
#       ending with `:**` (matches **Formatter notes**, **Audit findings**,
#       **Formatter corrections**, **Normalizations applied**, and any future
#       variants). Also strips prefix artifacts (before Parsed: line).
#       With fallback: if no "Parsed:" line, just strips suffix artifacts.
#     * ROOT CAUSE: v1.8.0 strip-formatter-notes only matched "**Formatter notes"
#       but writer-formatter produces at least 4 distinct artifact headers.
#       strip-parsed-prefix had no fallback — if RESEARCH OUTPUT line was missing,
#       it produced empty output, likely causing the Financial Crisis 4-byte failure.
#     * RESULT: Robust stripping that degrades gracefully instead of catastrophically.
#
# v1.8.0 (2026-03-11):
#   - FIX: Added strip-parsed-prefix bash step between format-research and analyze
#     * ROOT CAUSE: Researcher-formatter outputs "Parsed: N claims..." as line 1,
#       but DA expects "RESEARCH OUTPUT" as line 1 for Format A detection. With
#       the Parsed prefix, DA falls to Format C→B path, producing narrative output
#       that causes DA-formatter to mark all traces_to as [narrative-mapped: uncertain].
#       Inference traces never survive to the final document.
#     * FIX: Inserted lightweight bash step that strips the Parsed: prefix line,
#       ensuring DA receives RESEARCH OUTPUT on line 1 → Format A → canonical
#       ANALYSIS OUTPUT with real F# traces.
#     * RESULT: Inference traces_to fields carry real F-number references
#       instead of [narrative-mapped: uncertain].
#   - FIX: Added strip-formatter-notes bash step between format-writer and derive-filename
#     * ROOT CAUSE: Writer-formatter occasionally appends internal processing notes
#       ("Formatter notes (not part of output):") after the CITATIONS block. The save
#       step does a mechanical write with no stripping, so notes survive into
#       the saved file.
#     * FIX: Inserted bash step that strips everything from "**Formatter notes" onward.
#       No-op when notes are absent.
#     * RESULT: Clean saved files with no internal processing artifacts.
#
# v1.7.0 (2026-03-10):
#   - FEATURE: Added resolve-urls step between research and format-research
#     * ROOT CAUSE: Researcher visits URLs via web_fetch but its output contains
#       source NAMES without https:// URLs. This is the 6th instance of
#       "instruction fixes don't hold" — the researcher's generation priors
#       override format instructions. Every downstream step faithfully passes
#       through nothing. Final citations show source: unattributed for all entries.
#     * FIX: Inserted a lightweight URL resolution step after research. Receives
#       research_output, extracts source names, uses web_search to find verified
#       URLs for each. Produces source_url_map passed to format-research.
#       Researcher-formatter receives both narrative and URL map, uses verified
#       URLs in preference to "unknown".
#     * RESULT: URLs recovered architecturally via verification, not instruction.
#       Complements researcher-formatter's own URL recovery (Stage 1.5) as
#       defense in depth.
#   - FIX: writer-formatter timeout 600s → 1200s (Stage 3.5 confidence-hedge
#     audit adds processing time)
#
# v1.6.0 (2026-03-10):
#   - FEATURE: Added format-analysis step (data-analyzer-formatter) between analyze and write
#     * ROOT CAUSE: DA can produce unstructured narrative prose when input framing is
#       ambiguous — no ANALYSIS OUTPUT block, no traces_to fields. Same root cause as
#       writer/storyteller/prioritizer format failures.
#     * FIX: Inserted data-analyzer-formatter step after analyze. Receives DA output +
#       original formatted_research. Produces canonical ANALYSIS OUTPUT block regardless
#       of DA output format. write and format-writer steps now consume formatted_analysis.
#     * RESULT: Analysis chain has architectural formatter catch — matches researcher,
#       writer, storyteller, and prioritizer formatter pattern.
#
# v1.5.0 (2026-03-09):
#   - FEATURE: Added required-field validation guard to research step
#     * ROOT CAUSE: If orchestrator passes wrong variable name, research_question
#       is empty and the pipeline silently runs a null-result research pass
#       with no useful output and no error signal.
#     * FIX: Added prompt-level fast-fail guard — if {{research_question}} is
#       blank, researcher returns a structured ERROR immediately rather than
#       proceeding with an empty query.
#     * RESULT: Misconfigured calls surface a clear, actionable error message
#       instead of silently producing garbage output.
#
# v1.4.0 (2026-03-09):
#   - FEATURE: Added writer-formatter step between write and derive-filename
#     * ROOT CAUSE: Writer with informal register (audience=myself) produces
#       good prose but skips all structural blocks (Parsed:, WRITER METADATA,
#       CITATIONS, CLAIMS TO VERIFY). Instruction-based fixes failed twice.
#       Same root cause as Researcher/Storyteller — generation priors override
#       format instructions.
#     * FIX: Added format-writer step using writer-formatter specialist, which
#       mirrors the researcher-formatter/story-formatter pattern. Receives
#       writer prose + analysis_output, extracts S-numbered claims, wraps
#       prose in all required structural blocks.
#     * save step updated: {{final_document}} → {{formatted_document}}
#     * RESULT: Structural compliance handled architecturally.
#
# v1.3.0 (2026-03-09):
#   - FIX: save step timed out at 120s ceiling on all runs
#     * ROOT CAUSE: save step was doing two things — (1) LLM reasoning to
#       derive a kebab-case filename from the research question, AND (2)
#       writing the full final_document (~20k bytes) to disk. Combined
#       agent spinup + filename reasoning + large-payload write exceeded
#       120s consistently.
#     * FIX 1: Split into two steps. New `derive-filename` step handles
#       filename derivation only (tiny prompt, 120s timeout). `save` step
#       now receives the pre-derived filename and does a mechanical write
#       with no LLM reasoning required.
#     * FIX 2: Increased save step timeout 120s → 300s as belt-and-suspenders
#       for the large-payload write.
#     * RESULT: Each step has a single responsibility; save step bottleneck
#       removed from the filename derivation path.
#
# v1.2.0 (2026-03-09):
#   - FIX: writer step timed out at 900s ceiling on broad research topics
#     * ROOT CAUSE: (1) No output scope constraints on the research step meant
#       the researcher could produce 5,000+ word narratives, creating oversized
#       input for downstream steps. (2) format-research timeout (600s) was the
#       smallest of any processing step despite receiving the largest payload.
#       (3) write timeout (900s) insufficient for broad topics even with
#       bounded input.
#     * FIX 1: Added scope constraints to research step prompt matching
#       narrative-chain.yaml v1.1.0 — max 5 sub-questions, 15 URLs, 2 QG
#       cycles, 3,000 words / 30 sourced claims.
#     * FIX 2: Increased format-research timeout 600s → 1200s (matches
#       narrative-chain.yaml).
#     * FIX 3: Increased write timeout 900s → 1800s to provide headroom for
#       broad topics even with bounded input.
#     * RESULT: Pipeline reliably completes for broad research questions.
#
# v1.1.0 (2026-03-03):
#   - Added save step — writes final document to docs/research-output/
#
# =============================================================================

name: "research-chain"
description: "Full research pipeline with format normalization — Researcher → URL Resolution → Formatter → Data Analyzer → Writer → Writer Formatter → Save"
version: "1.8.2"
tags: ["research", "analysis", "writing", "chain"]

context:
  research_question: ""      # Required: the question or topic to research
  output_format: "brief"     # Optional: output format (e.g. brief, report, memo, deck)
  audience: ""               # Optional: target audience for the final document
  voice: "executive"         # Optional: writing voice/tone (e.g. executive, academic, casual)
  quality_threshold: "medium" # Optional: quality bar for the run (low, medium, high)

steps:
  - id: "research"
    agent: "specialists:specialists/researcher"
    prompt: |
      REQUIRED: research_question must not be blank. If {{research_question}} is empty
      or blank, stop immediately and return: "ERROR: research_question is required but
      was not provided. Please provide a research question."

      Research the following question thoroughly. Follow your full research pipeline.
      Focus on finding trustworthy evidence with source tiering and confidence
      assessments. Do not worry about output format — the formatter handles that.

      Research question: {{research_question}}

      Quality threshold: {{quality_threshold}}

      Scope constraints (required — enforce in Stage 1):
      - Decompose into no more than 5 sub-questions
      - Cap your source queue at 15 URLs total across all sub-questions
      - Run no more than 2 Quality Gate cycles before accepting remaining gaps
      - Target a maximum of 3,000 words and 30 sourced claims in your final output
    output: "research_output"
    timeout: 2700

  - id: "resolve-urls"
    agent: "foundation:web-research"
    prompt: |
      You are a URL verification utility. Your ONLY job is to find verified URLs for
      source names mentioned in a research output. You do NOT research, analyze, or
      summarize — you look up URLs.

      Below is a research output that mentions sources by name (e.g., "TechCrunch",
      "Bloomberg", "Contrary Research", "poolside.ai") but may be missing full
      https:// URLs for some or all of them.

      Research topic for search context: {{research_question}}

      Research output:
      {{research_output}}

      TASK:
      1. Extract every distinct source name mentioned in the research output
         (publication names, company sites, report titles, blog names).
         Cap at 15 sources maximum — prioritize primary and secondary tier sources.

      2. For each source name, run ONE web_search to find the actual article URL.
         Search query pattern: "[source name] [key topic words from research question] [year if mentioned]"
         Example: "TechCrunch Poolside AI Series B 2024"

      3. From the search results, pick the best-matching URL — same publication,
         same topic, plausible date. If no good match, mark as "not found".

      4. Return ONLY a source URL map in this exact format — nothing else:

      SOURCE_URL_MAP
      - name: "TechCrunch — Poolside AI raises $500M"
        url: "https://techcrunch.com/2024/10/15/poolside-ai-raises-500m-series-b/"
        match: verified
      - name: "Contrary Research — Poolside Business Breakdown"
        url: "https://research.contrary.com/company/poolside-ai"
        match: verified
      - name: "Some Obscure Blog"
        url: not found
        match: none
      END_SOURCE_URL_MAP

      Rules:
      - One web_search per source, no more. This step must stay fast.
      - Never fabricate a URL. If search results don't have a clear match, say "not found".
      - The map format must be exactly as shown — downstream parsing depends on it.
      - Do not include any text before SOURCE_URL_MAP or after END_SOURCE_URL_MAP.
    output: "source_url_map"
    timeout: 600

  - id: "format-research"
    agent: "specialists:specialists/researcher-formatter"
    prompt: |
      Normalize the following research narrative into your canonical RESEARCH OUTPUT
      block format. Apply all standard formatting rules: structured sections, source
      tiering, per-claim confidence scores, and gap flags.

      Research narrative to format:
      {{research_output}}

      SOURCE URL MAP (verified URLs for sources named in the narrative):
      {{source_url_map}}

      URL resolution instructions: A prior pipeline step searched for verified URLs
      matching source names in the research narrative. When you encounter a source
      name that matches an entry in the URL map with match: verified, use that URL
      as the Source value for that finding. This is extracted data, not invention —
      the URLs were verified via web search. Only fall back to your own URL recovery
      (Stage 1.5) or "unknown" for sources not in the map or marked "not found".
    output: "formatted_research"
    timeout: 1200

  - id: "strip-parsed-prefix"
    type: "bash"
    command: |
      _sp_tmp=$(mktemp)
      cat > "$_sp_tmp" <<'__STRIP_PARSED_EOF__'
      {{formatted_research}}
      __STRIP_PARSED_EOF__
      if grep -q '^RESEARCH OUTPUT' "$_sp_tmp"; then
        awk '/^RESEARCH OUTPUT/{found=1} found{print}' "$_sp_tmp"
      else
        cat "$_sp_tmp"
      fi
      rm -f "$_sp_tmp"
    output: "formatted_research_clean"
    timeout: 30

  - id: "analyze"
    agent: "specialists:specialists/data-analyzer"
    prompt: |
      Analyze the following formatted research output. Draw inferences, identify
      patterns, surface key insights, and flag confidence gaps. Follow your full
      analysis pipeline.

      Formatted research:
      {{formatted_research_clean}}
    output: "analysis_output"
    timeout: 900

  - id: "format-analysis"
    agent: "specialists:specialists/data-analyzer-formatter"
    prompt: |
      Normalize the following data-analyzer output into a canonical ANALYSIS OUTPUT block.

      Data-analyzer output to format:
      {{analysis_output}}

      Original research (authoritative source for F1-Fn findings):
      {{formatted_research}}
    output: "formatted_analysis"
    timeout: 600

  - id: "write"
    agent: "specialists:specialists/writer"
    prompt: |
      Transform the following analysis into a polished document. Follow your full
      writing pipeline and return WRITER METADATA, the document body with section
      attribution lines, CITATIONS, and CLAIMS TO VERIFY blocks.

      Analysis:
      {{formatted_analysis}}

      SOURCE URL MAP (verified URLs for sources — use these in CITATIONS):
      {{source_url_map}}

      Output format: {{output_format}}
      Audience: {{audience}}
      Voice: {{voice}}

      If audience is empty, default to a general professional audience.
      When building your CITATIONS block, match source names to the URL map above
      and use the verified https:// URLs. This ensures source provenance survives
      the analysis step.
    output: "final_document"
    timeout: 1800

  - id: "format-writer"
    agent: "specialists:specialists/writer-formatter"
    prompt: |
      Produce the canonical Writer output block from the following writer output.

      Original source material (source of S-numbered claims):
      {{formatted_analysis}}

      Writer output to format:
      {{final_document}}
    output: "formatted_document"
    timeout: 1200

  - id: "strip-formatter-notes"
    type: "bash"
    command: |
      _fn_tmp=$(mktemp)
      cat > "$_fn_tmp" <<'__STRIP_NOTES_EOF__'
      {{formatted_document}}
      __STRIP_NOTES_EOF__
      _start=$(grep -n '^Parsed:' "$_fn_tmp" | head -1 | cut -d: -f1)
      _end=$(grep -n '^S[0-9]\{1,\}:' "$_fn_tmp" | tail -1 | cut -d: -f1)
      if [ -n "$_start" ] && [ -n "$_end" ]; then
        sed -n "${_start},${_end}p" "$_fn_tmp"
      elif [ -n "$_start" ]; then
        awk '/^Parsed:/ && !s{s=1} s && /^[*][*].*:[*][*]$/{exit} s{print}' "$_fn_tmp"
      else
        cat "$_fn_tmp"
      fi
      rm -f "$_fn_tmp"
    output: "formatted_document_clean"
    timeout: 30

  - id: "derive-filename"
    agent: "foundation:file-ops"
    prompt: |
      Convert the following research question into a short kebab-case filename slug (3-5 words).
      Return only the slug — no explanation, no punctuation, no extension.

      Research question: "{{research_question}}"

      Example: "State of open source LLMs in 2026" → "open-source-llms-2026"
      Example: "How does Microsoft compete in the AI era?" → "microsoft-compete-ai-era"
    output: "filename_slug"
    timeout: 120

  - id: "save"
    agent: "foundation:file-ops"
    prompt: |
      Save the following document to disk.

      File path: docs/research-output/{{filename_slug}}.md
      Create the docs/research-output/ directory if it does not exist.
      Report the full file path you saved to.

      Content to save:
      {{formatted_document_clean}}
    output: "output_path"
    timeout: 300
