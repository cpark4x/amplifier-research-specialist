# =============================================================================
# CHANGELOG
# =============================================================================
#
# v1.2.0 (2026-03-09):
#   - FIX: writer step timed out at 900s ceiling on broad research topics
#     * ROOT CAUSE: (1) No output scope constraints on the research step meant
#       the researcher could produce 5,000+ word narratives, creating oversized
#       input for downstream steps. (2) format-research timeout (600s) was the
#       smallest of any processing step despite receiving the largest payload.
#       (3) write timeout (900s) insufficient for broad topics even with
#       bounded input.
#     * FIX 1: Added scope constraints to research step prompt matching
#       narrative-chain.yaml v1.1.0 — max 5 sub-questions, 15 URLs, 2 QG
#       cycles, 3,000 words / 30 sourced claims.
#     * FIX 2: Increased format-research timeout 600s → 1200s (matches
#       narrative-chain.yaml).
#     * FIX 3: Increased write timeout 900s → 1800s to provide headroom for
#       broad topics even with bounded input.
#     * RESULT: Pipeline reliably completes for broad research questions.
#
# v1.1.0 (2026-03-03):
#   - Added save step — writes final document to docs/research-output/
#
# =============================================================================

name: "research-chain"
description: "Full research pipeline with format normalization — Researcher → Formatter → Data Analyzer → Writer → Save"
version: "1.2.0"
tags: ["research", "analysis", "writing", "chain"]

context:
  research_question: ""      # Required: the question or topic to research
  output_format: "brief"     # Optional: output format (e.g. brief, report, memo, deck)
  audience: ""               # Optional: target audience for the final document
  voice: "executive"         # Optional: writing voice/tone (e.g. executive, academic, casual)
  quality_threshold: "medium" # Optional: quality bar for the run (low, medium, high)

steps:
  - id: "research"
    agent: "specialists:specialists/researcher"
    prompt: |
      Research the following question thoroughly. Follow your full research pipeline.
      Focus on finding trustworthy evidence with source tiering and confidence
      assessments. Do not worry about output format — the formatter handles that.

      Research question: {{research_question}}

      Quality threshold: {{quality_threshold}}

      Scope constraints (required — enforce in Stage 1):
      - Decompose into no more than 5 sub-questions
      - Cap your source queue at 15 URLs total across all sub-questions
      - Run no more than 2 Quality Gate cycles before accepting remaining gaps
      - Target a maximum of 3,000 words and 30 sourced claims in your final output
    output: "research_output"
    timeout: 2700

  - id: "format-research"
    agent: "specialists:specialists/researcher-formatter"
    prompt: |
      Normalize the following research narrative into your canonical RESEARCH OUTPUT
      block format. Apply all standard formatting rules: structured sections, source
      tiering, per-claim confidence scores, and gap flags.

      Research narrative to format:
      {{research_output}}
    output: "formatted_research"
    timeout: 1200

  - id: "analyze"
    agent: "specialists:specialists/data-analyzer"
    prompt: |
      Analyze the following formatted research output. Draw inferences, identify
      patterns, surface key insights, and flag confidence gaps. Follow your full
      analysis pipeline.

      Formatted research:
      {{formatted_research}}
    output: "analysis_output"
    timeout: 900

  - id: "write"
    agent: "specialists:specialists/writer"
    prompt: |
      Transform the following analysis into a polished document. Follow your full
      writing pipeline and return WRITER METADATA, the document body with section
      attribution lines, CITATIONS, and CLAIMS TO VERIFY blocks.

      Analysis:
      {{analysis_output}}

      Output format: {{output_format}}
      Audience: {{audience}}
      Voice: {{voice}}

      If audience is empty, default to a general professional audience.
    output: "final_document"
    timeout: 1800

  - id: "save"
    agent: "foundation:file-ops"
    prompt: |
      Save the following document to disk.

      1. Derive a short kebab-case filename (3-5 words) from this research question:
         "{{research_question}}"
         Example: if the question is about Microsoft roles in AI, use "microsoft-roles-ai-era"

      2. Save the content to: docs/research-output/[your-derived-filename].md
         Create the docs/research-output/ directory if it does not exist.

      3. Report the full file path you saved to.

      Content to save:
      {{final_document}}
    output: "output_path"
    timeout: 120
