name: "quality-eval-iteration"
description: "Competitive evaluation sub-recipe — runs ONE topic through the full pipeline, then benchmarks 3 competitors in parallel, then evaluates all outputs for gaps."
version: "1.0.0"
tags: [evaluation, competitive, quality, iteration]

context:
  research_question: ""   # Required: the topic query to evaluate
  topic_id: ""            # Required: the topic ID (e.g. factual-deep-dive)

steps:
  # ===========================================================================
  # STEP 1: Load competitor definitions from YAML
  # ===========================================================================
  - id: "load-competitors"
    type: "bash"
    command: |
      uv run --with pyyaml python -c "
      import json, yaml
      with open('specs/evaluation/competitors.yaml') as f:
          data = yaml.safe_load(f)
      print(json.dumps(data['competitors']))
      "
    output: "competitors"
    parse_json: true
    timeout: 10

  # ===========================================================================
  # STEP 2: Record pipeline start marker (for stale-output detection)
  # ===========================================================================
  - id: "mark-pipeline-start"
    type: "bash"
    command: |
      touch /tmp/quality-eval-marker-{{topic_id}}
      echo "/tmp/quality-eval-marker-{{topic_id}}"
    output: "pipeline_start_marker"
    timeout: 10

  # ===========================================================================
  # STEP 3: Run the specialists pipeline for this topic
  # ===========================================================================
  - id: "run-pipeline"
    agent: "self"
    prompt: |
      You are running the specialists research pipeline on this question.

      Research question: {{research_question}}

      Execute this pipeline by delegating to specialist agents in order:

      1. Delegate to specialists:researcher — research the question thoroughly
      2. Delegate to specialists:researcher-formatter — pass the researcher's output to normalize format
      3. Delegate to specialists:data-analyzer — pass the formatted research to draw analytical conclusions
      4. Delegate to specialists:data-analyzer-formatter — normalize the analysis output
      5. Delegate to specialists:writer — pass the formatted analysis to write a brief
      6. Delegate to specialists:writer-formatter — normalize the writer output

      After each step, pass the output of the previous step as input to the next.

      When the chain is complete, save the final formatted document to docs/research-output/ using
      the write_file tool. Use a filename based on the research question (kebab-case slug + .md).

      Report what happened at each step — success/failure, output size, any issues.
    output: "pipeline_run_result"
    timeout: 3600
    retry:
      max_attempts: 3
      backoff: "exponential"
      initial_delay: 15
      max_delay: 300
    on_error: "continue"

  # ===========================================================================
  # STEP 4: Capture pipeline output from docs/research-output/
  # ===========================================================================
  - id: "capture-pipeline-output"
    type: "bash"
    command: |
      marker="{{pipeline_start_marker}}"

      # Find files written after the pipeline started (newer than the start marker)
      latest=$(find docs/research-output -name "*.md" -newer "$marker" -maxdepth 1 2>/dev/null | head -1)

      if [ -z "$latest" ]; then
        # Fallback: check if ANY .md file exists
        latest=$(ls -t docs/research-output/*.md 2>/dev/null | head -1)
        if [ -z "$latest" ]; then
          echo "PIPELINE_ERROR: No output file found in docs/research-output/ for topic: {{topic_id}}"
          exit 0
        fi
        echo "PIPELINE_WARNING: Possible stale output — using most recent file (no new file found after pipeline started). Topic: {{topic_id}}. File: $latest"
      fi

      # Read and validate content
      content=$(cat "$latest" 2>/dev/null)
      if [ -z "$content" ]; then
        echo "PIPELINE_ERROR: Output file exists but is empty or unreadable: $latest"
        exit 0
      fi

      printf '%s' "$content"
    output: "pipeline_output"
    timeout: 30

  # ===========================================================================
  # STEP 4: Run 3 competitors in parallel on the same question
  # ===========================================================================
  - id: "run-competitors"
    foreach: "{{competitors}}"
    as: "competitor"
    parallel: 3
    collect: "competitor_results"
    agent: "foundation:web-research"
    provider_preferences:
      - provider: "{{competitor.provider}}"
        model: "{{competitor.model}}"
    prompt: |
      You are competing in a research benchmark. Research the following question
      thoroughly and produce the best possible answer you can.

      Research question: {{research_question}}

      Requirements:
      - Provide thorough, well-sourced research on the topic
      - Attribute every factual claim to a specific source with a URL where possible
      - Include confidence levels for key claims (e.g., HIGH / MEDIUM / LOW)
      - Provide analytical insight — don't just summarize, draw conclusions
      - Acknowledge gaps where information was unavailable or uncertain
      - Structure your response clearly with sections and headers

      Produce a comprehensive research response that a discerning analyst would
      find credible, well-supported, and analytically valuable.
    output: "competitor_result"
    timeout: 2700
    retry:
      max_attempts: 3
      backoff: "exponential"
      initial_delay: 15
      max_delay: 300
    on_error: "continue"

  # ===========================================================================
  # STEP 5: Evaluate pipeline vs competitors — produce structured gap list
  # ===========================================================================
  - id: "evaluate"
    agent: "self"
    prompt: |
      COMPARATIVE EVALUATOR — you are a rigorous research quality analyst.

      Topic ID: {{topic_id}}
      Research Question: {{research_question}}

      Your task: score the pipeline output and each competitor output on 6 dimensions,
      then produce a structured gap analysis.

      SCORING DIMENSIONS (1–10 scale):
      1. Source quality         — credibility, diversity, and tier of sources cited
      2. Factual depth          — breadth and accuracy of factual coverage
      3. Analytical insight     — quality of inferences, conclusions, and synthesis
      4. Confidence calibration — appropriate hedging, uncertainty acknowledgment
      5. Structure & readability — organization, clarity, and navigability
      6. Citation quality       — specificity, verifiability, and URL completeness

      =====================================================================
      PIPELINE OUTPUT:
      {{pipeline_output}}

      =====================================================================
      COMPETITOR RESULTS:
      {{competitor_results}}

      =====================================================================

      Produce a COMPETITIVE EVALUATION REPORT with the following sections:

      ## DIMENSION SCORES
      For each output (pipeline + each competitor), provide scores on all 6 dimensions.
      Use a table format.

      ## GAP LIST
      List every dimension where the pipeline score is lower than at least one
      competitor by 2 or more points. For each gap:
        - Dimension name
        - Pipeline score vs. best competitor score
        - Specific evidence from the outputs (quote or paraphrase)
        - Root cause hypothesis

      ## PIPELINE WINS
      Dimensions where the pipeline outperforms all competitors, with evidence.

      ## SUMMARY
      A 2–3 sentence overall assessment: where does the pipeline excel, where
      does it fall short, and what is the single highest-priority improvement?
    output: "evaluation_report"
    retry:
      max_attempts: 3
      backoff: "exponential"
      initial_delay: 15
      max_delay: 300
    timeout: 1800
