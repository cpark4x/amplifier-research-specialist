# =============================================================================
# CHANGELOG
# =============================================================================
#
# v1.2.0 (2026-03-09):
#   - FEATURE: Added writer-formatter step between write and save
#     * Mirrors the pattern established in research-chain.yaml v1.4.0 and
#       narrative-chain.yaml. Writer with non-default register skips structural
#       blocks (WRITER METADATA, CITATIONS, CLAIMS TO VERIFY); formatter
#       enforces compliance architecturally.
#     * Source material passed to format-writer: {{competitive_analysis_output}}
#     * save step updated: {{final_document}} → {{formatted_document}}
#
# v1.1.0 (2026-03-03):
#   - Added save step — writes final document to docs/research-output/
#
# =============================================================================

name: "competitive-analysis-brief"
description: "Transform a competitive question into a polished document. Runs competitive-analysis then writer in sequence. For higher-fidelity runs with Researcher pre-pass, use competitive-analysis-brief-researched."
version: "1.2.0"
tags: ["competitive-analysis", "writing", "chain"]

context:
  query: ""       # Required: the competitive question to analyze
  subjects: ""    # Optional: specific subjects to compare (e.g. "Notion, Obsidian, Roam")
  dimensions: ""  # Optional: specific dimensions to evaluate (e.g. "pricing, features, UX")
  format: ""      # Optional: output format (defaults to "report" if empty)
  audience: ""    # Optional: target audience (defaults to "general" if empty)

steps:
  - id: "analyze"
    agent: "specialists:specialists/competitive-analysis"
    prompt: |
      Run a full competitive analysis on the following question.

      Query: {{query}}

      If subjects or dimensions were provided, use them:
      Subjects: {{subjects}}
      Dimensions: {{dimensions}}

      Follow your full 6-stage pipeline. Return your output in the standard
      CompetitiveAnalysisOutput format.
    output: "competitive_analysis_output"
    timeout: 1800

  - id: "write"
    agent: "specialists:specialists/writer"
    prompt: |
      Transform the following competitive analysis output into a polished document.

      Source material:
      {{competitive_analysis_output}}

      Output format: {{format}}
      Audience: {{audience}}

      If format or audience are empty, default to: format=report, audience=general.

      Follow your full 5-stage pipeline. Return WRITER METADATA, document content
      with section attribution lines, CITATIONS, and CLAIMS TO VERIFY blocks.
    output: "final_document"
    timeout: 900

  - id: "format-writer"
    agent: "specialists:specialists/writer-formatter"
    prompt: |
      Produce the canonical Writer output block from the following writer output.

      Original source material (source of S-numbered claims):
      {{competitive_analysis_output}}

      Writer output to format:
      {{final_document}}
    output: "formatted_document"
    timeout: 600

  - id: "save"
    agent: "foundation:file-ops"
    prompt: |
      Save the following document to disk.

      1. Derive a short kebab-case filename (3-5 words) from this query:
         "{{query}}"
         Example: if the query is about Notion vs Obsidian, use "notion-vs-obsidian"

      2. Save the content to: docs/research-output/[your-derived-filename].md
         Create the docs/research-output/ directory if it does not exist.

      3. Report the full file path you saved to.

      Content to save:
      {{formatted_document}}
    output: "output_path"
    timeout: 120
