# =============================================================================
# CHANGELOG
# =============================================================================
#
# v1.2.2 (2026-03-09):
#   - FEATURE: Added story-formatter step between narrate and normalize-header
#     * ROOT CAUSE: Storyteller consistently produces narrative prose/markdown
#       documents instead of canonical STORY OUTPUT blocks. Format instructions
#       in system context do not reliably override generation priors — same
#       root cause as the Researcher's format compliance failure.
#     * FIX: Added story-format step using story-formatter specialist, which
#       mirrors the researcher-formatter pattern. Receives raw storyteller
#       output + original analysis, classifies findings against the narrative,
#       and produces a canonical STORY OUTPUT block.
#     * normalize-header input updated: {{final_narrative}} → {{formatted_narrative}}
#     * RESULT: Structural compliance handled architecturally, not via prompts.
#
# v1.2.1 (2026-03-05):
#   - BUGFIX: normalize-quality-gate crashed with "command not found" / syntax
#     error when the narrative contained numbered list items like "1) Build:".
#     * ROOT CAUSE: bash's lexer scans the content of `$(...)` command
#       substitutions for the matching `)` BEFORE honouring heredoc delimiters.
#       Any `)` that appears in the narrative content injected via
#       {{final_narrative_normalized}} (e.g. "1) Build:" or "2) Reframe…")
#       was misread as the closing paren of `normalized=$(sed … <<'EOF' … EOF)`
#       causing the heredoc to terminate early and subsequent narrative lines to
#       be executed as shell commands ("Build: command not found").
#     * FIX: Replaced the heredoc-inside-$() pattern with a temp-file pattern:
#       write content into a mktemp file using a top-level heredoc (immune to
#       the nested-paren scan), then run sed against the file inside $().
#       The $() for sed now contains only a filename, never a heredoc.
#     * RESULT: Numbered-list content, parentheses, and all other punctuation
#       in the narrative are handled safely regardless of model output.
#   - IMPROVEMENT: Increased save step timeout 120s → 300s
#     * ROOT CAUSE: When narrative-chain runs in parallel with other LLM-heavy
#       recipes, provider rate-limiting / request queuing can delay the
#       foundation:file-ops agent beyond 120s despite the operation itself being
#       lightweight (~20-40s solo).
#     * FIX: Bumped save timeout to 300s to provide headroom under contention.
#     * RESULT: save step survives moderate LLM back-pressure without changing
#       any behavior.
#
# v1.2.0 (2026-03-04):
#   - FEATURE: Enforce MET|NOT MET vocabulary in quality gate output
#     * PROBLEM: Storyteller (and downstream LLM variation) occasionally emits
#       PASS/FAIL/PASSED/FAILED instead of the canonical MET/NOT MET vocabulary,
#       causing downstream consumers to miss or misparse the quality signal.
#     * CHANGE 1: Added 'Mechanical fail triggers' subsection to Stage 5 of the
#       storyteller specialist (sparse input, evidence collapse, upstream NOT MET)
#       so NOT MET is now realistically reachable via objective criteria.
#     * CHANGE 2: Appended explicit VOCABULARY CONSTRAINT to the narrate step
#       prompt: value must be exactly MET or NOT MET; PASS/FAIL synonyms prohibited.
#     * CHANGE 3: Added deterministic bash post-processing step
#       (normalize-quality-gate) between normalize-header and save. Normalizes
#       PASS/PASSED -> MET and FAIL/FAILED -> NOT MET. Appends a NOT MET line
#       with an explanatory note if the QUALITY THRESHOLD RESULT line is absent.
#     * CHANGE 4: save step now consumes {{final_narrative_validated}} (output of
#       normalize-quality-gate) instead of {{final_narrative_normalized}}.
#     * RESULT: Quality gate vocabulary is deterministically enforced regardless
#       of model output variation. Missing lines are caught and defaulted safely.
#
# v1.1.1 (2026-03-04):
#   - BUGFIX: Saved narrative file started with markdown heading instead of plain text
#     * ROOT CAUSE: Storyteller model sometimes emits `## STORY OUTPUT` or
#       `# STORY OUTPUT` despite explicit prompt instructions requiring plain-text
#       `STORY OUTPUT` as the first line. Prompt-level enforcement alone is
#       insufficient because models non-deterministically add heading prefixes.
#     * FIX: Added a deterministic bash post-processing step (normalize-header)
#       between narrate and save. Uses sed with a quoted heredoc to strip any
#       leading `#` prefix from the first line, producing the derived variable
#       `final_narrative_normalized` consumed by the save step.
#     * RESULT: Saved files always begin with plain-text `STORY OUTPUT` regardless
#       of whether the model emits a markdown heading prefix.
#
# v1.1.0 (2026-03-04):
#   - BUGFIX: format-research step timed out at 600s on medium-sized research
#     * ROOT CAUSE: The formatter receives the largest payload in the chain
#       (raw research output before any condensation) but had the smallest
#       timeout of any processing step (600s vs 900s for analyze/narrate).
#     * FIX: Increased format-research timeout 600s → 1200s (2×). Added a
#       soft output-bounding constraint to the research step (≤3 000 words /
#       30 sourced claims) so downstream steps receive predictably-sized input.
#     * RESULT: Pipeline reliably completes for typical medium-sized research.
#
# v1.0.0 (initial):
#   - Initial release of narrative-chain recipe.
#
# =============================================================================

name: "narrative-chain"
description: "Full research-to-narrative pipeline — Researcher → Formatter → Data Analyzer → Storyteller → Story Formatter → Save. Produces compelling narrative output instead of a structured document."
version: "1.3.0"
tags: ["research", "analysis", "narrative", "storytelling", "chain"]

context:
  research_question: ""      # Required: the question or topic to research
  audience: ""               # Optional: target audience for the final narrative
  tone: ""                   # Optional: tone/style for the narrative (e.g. dramatic, optimistic, neutral)
  quality_threshold: "medium" # Optional: quality bar for the run (low, medium, high)

steps:
  - id: "research"
    agent: "specialists:researcher"
    prompt: |
      Research the following question thoroughly. Follow your full research pipeline
      and return your complete research narrative with sourced evidence, confidence
      scores, and source tiering.

      Research question: {{research_question}}

      Quality threshold: {{quality_threshold}}

      Scope constraints (required — enforce in Stage 1):
      - Decompose into no more than 5 sub-questions
      - Cap your source queue at 15 URLs total across all sub-questions
      - Run no more than 2 Quality Gate cycles before accepting remaining gaps
      - Target a maximum of 3,000 words and 30 sourced claims in your final output
    output: "research_output"
    timeout: 4500

  - id: "validate-research"
    type: "bash"
    command: |
      _vr_tmp=$(mktemp)
      cat > "$_vr_tmp" <<'__VALIDATE_EOF__'
      {{research_output}}
      __VALIDATE_EOF__
      _bytes=$(wc -c < "$_vr_tmp")
      _has_findings=$(grep -ci -E '(finding|source|confidence|claim|evidence)' "$_vr_tmp" || true)
      if [ "$_bytes" -lt 500 ]; then
        echo "GATE_FAIL: Research output is only ${_bytes} bytes — likely a truncated metadata summary, not full research. Aborting pipeline."
        rm -f "$_vr_tmp"
        exit 1
      elif [ "$_has_findings" -lt 3 ]; then
        echo "GATE_FAIL: Research output has fewer than 3 evidence markers (findings/sources/confidence). Likely not substantive research. Aborting pipeline."
        rm -f "$_vr_tmp"
        exit 1
      else
        echo "GATE_PASS: Research output is ${_bytes} bytes with ${_has_findings} evidence markers."
        rm -f "$_vr_tmp"
      fi
    output: "research_validation"
    timeout: 30

  - id: "format-research"
    agent: "specialists:researcher-formatter"
    prompt: |
      Normalize the following research narrative into your canonical RESEARCH OUTPUT
      block format. Apply all standard formatting rules: structured sections, source
      tiering, per-claim confidence scores, and gap flags.

      Research narrative to format:
      {{research_output}}
    output: "formatted_research"
    timeout: 1200

  - id: "analyze"
    agent: "specialists:data-analyzer"
    prompt: |
      Analyze the following formatted research output. Draw inferences, identify
      patterns, surface key insights, and flag confidence gaps. Follow your full
      analysis pipeline.

      Formatted research:
      {{formatted_research}}
    output: "analysis_output"
    timeout: 900

  - id: "narrate"
    agent: "specialists:storyteller"
    prompt: |
      CRITICAL FORMAT REQUIREMENT: Your response MUST begin with the exact plain-text
      line `STORY OUTPUT` — no `#` prefix, no `##` prefix, no markdown heading of any
      kind. The very first characters you emit must be `STORY OUTPUT` (plain text only).
      WRONG: `# STORY OUTPUT` / `## STORY OUTPUT`
      RIGHT: `STORY OUTPUT`

      Transform the following analysis into a compelling narrative. Follow your full
      5-stage pipeline: Parse, Find the Drama, Select and Structure, Draft, and
      Quality Gate. Return the complete STORY OUTPUT block with NARRATIVE SELECTION
      record, story prose, and QUALITY THRESHOLD RESULT.

      Analysis: {{analysis_output}}

      Audience: {{audience}}

      Tone: {{tone}}

      If audience is empty, infer from the content.
      If tone is empty, infer from the content and audience.

      VOCABULARY CONSTRAINT: In your QUALITY THRESHOLD RESULT line, use exactly `MET` or
      `NOT MET` as the value. Do NOT use PASS, FAIL, PASSED, or FAILED — these are
      prohibited synonyms that will be rejected by downstream normalization.
    output: "final_narrative"
    timeout: 900

  - id: "story-format"
    agent: "specialists:story-formatter"
    prompt: |
      Produce the canonical STORY OUTPUT block from the following storyteller output.

      Original analysis (source of findings F1, F2, etc.):
      {{analysis_output}}

      Storyteller output to format:
      {{final_narrative}}
    output: "formatted_narrative"
    timeout: 600

  - id: "normalize-header"
    type: "bash"
    command: |
      sed '1s/^##* STORY OUTPUT/STORY OUTPUT/' <<'__RECIPE_NORM_EOF__'
      {{formatted_narrative}}
      __RECIPE_NORM_EOF__
    output: "final_narrative_normalized"
    timeout: 30

  - id: "normalize-quality-gate"
    type: "bash"
    command: |
      _qg_tmp=$(mktemp)
      cat > "$_qg_tmp" <<'__QG_NORM_EOF__'
      {{final_narrative_normalized}}
      __QG_NORM_EOF__
      normalized=$(sed \
        -e 's/^QUALITY THRESHOLD RESULT: PASSED$/QUALITY THRESHOLD RESULT: MET/' \
        -e 's/^QUALITY THRESHOLD RESULT: PASS$/QUALITY THRESHOLD RESULT: MET/' \
        -e 's/^QUALITY THRESHOLD RESULT: FAILED$/QUALITY THRESHOLD RESULT: NOT MET/' \
        -e 's/^QUALITY THRESHOLD RESULT: FAIL$/QUALITY THRESHOLD RESULT: NOT MET/' \
        "$_qg_tmp")
      rm -f "$_qg_tmp"
      if printf '%s' "$normalized" | grep -q '^QUALITY THRESHOLD RESULT:'; then
        printf '%s' "$normalized"
      else
        printf '%s\nQUALITY THRESHOLD RESULT: NOT MET\nNote: quality gate line was missing from storyteller output\n' "$normalized"
      fi
    output: "final_narrative_validated"
    timeout: 30

  - id: "save"
    agent: "foundation:file-ops"
    prompt: |
      Save the following narrative to disk.

      1. Derive a short kebab-case filename (3-5 words) from this research question:
         {{research_question}}

      2. Save to: docs/research-output/[your-derived-filename].md
         Create the docs/research-output/ directory if it does not exist.

      3. Report the full file path saved to.

      Content: {{final_narrative_validated}}
    output: "output_path"
    timeout: 300
